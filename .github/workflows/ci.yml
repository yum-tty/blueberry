name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Clone sibling packages
        run: |
          cd ..
          git clone --depth 1 https://github.com/yum-tty/caramel.git
          git clone --depth 1 https://github.com/yum-tty/cinnamon-bun.git
          git clone --depth 1 https://github.com/yum-tty/cinnamon.git
          git clone --depth 1 https://github.com/yum-tty/blueberry.git
          git clone --depth 1 https://github.com/yum-tty/marshmallow.git
          git clone --depth 1 https://github.com/yum-tty/prompts.git

      - name: Install dependencies
        run: bun install

      - name: Type-check
        run: bun x tsc --noEmit

      - name: Test
        run: bun test
